<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Love</title>
    <style>
        :root {
            --primary-color: #ff4d6d;
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --glass: rgba(255, 255, 255, 0.1);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            color: white;
            overflow: hidden;
        }

        #ui-container {
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: var(--shadow);
            z-index: 10;
            transition: all 0.5s ease;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 15px var(--primary-color);
            color: #ffb7c5;
        }

        .stats {
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        button {
            background: var(--primary-color);
            border: none;
            padding: 15px 40px;
            color: white;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px;
            font-weight: bold;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--primary-color);
        }

        button.reset-btn {
            background: transparent;
            border: 2px solid #555;
            font-size: 0.9rem;
            padding: 10px 20px;
        }

        /* Ігрове поле */
        #game-board {
            display: none;
            grid-template-columns: repeat(3, 120px);
            grid-gap: 15px;
            margin-top: 20px;
        }

        .tile {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            user-select: none;
        }

        .tile.active {
            border-color: white;
            transform: scale(1.05);
            box-shadow: 0 0 30px white;
            z-index: 2;
        }

        .tile.disabled {
            pointer-events: none;
            cursor: default;
        }

        .hidden {
            display: none !important;
        }

        #score-display {
            font-size: 1.5rem;
            margin-top: 20px;
            font-weight: bold;
        }

        /* Ефекти для фото */
        .effect-0 { filter: none; }
        .effect-1 { filter: hue-rotate(90deg) saturate(1.5); }
        .effect-2 { filter: hue-rotate(180deg) brightness(1.2); }
        .effect-3 { filter: sepia(0.8) contrast(1.2); }
        .effect-4 { filter: invert(0.1) brightness(1.1) rotate(5deg); }

    </style>
</head>
<body>

    <div id="ui-container">
        <div id="menu">
            <h1>Memory Love</h1>
            <div class="stats">Рекорд: <span id="high-score">0</span></div>
            <button onclick="startGame()">ПОЧАТИ ГРУ</button>
            <br>
            <button class="reset-btn" onclick="resetHighScore()">Скинути рекорд</button>
        </div>

        <div id="game-container" class="hidden">
            <div id="score-display">Раунд: 1</div>
            <div id="game-board"></div>
        </div>
    </div>

    <script>
        const images = ['Tito.png', 'Smartik.png', 'Junior.png', 'Fil.png', 'Milka.png'];
        let gameSequence = [];
        let userSequence = [];
        let isPlayingSequence = false;
        let score = 0;

        const board = document.getElementById('game-board');
        const menu = document.getElementById('menu');
        const gameContainer = document.getElementById('game-container');
        const highScoreElement = document.getElementById('high-score');
        const scoreDisplay = document.getElementById('score-display');

        // Ініціалізація рекорду
        updateHighScoreDisplay();

        function startGame() {
            menu.classList.add('hidden');
            gameContainer.classList.remove('hidden');
            board.style.display = 'grid';
            
            score = 0;
            gameSequence = [];
            createBoard();
            nextRound();
        }

        function createBoard() {
            board.innerHTML = '';
            // Створюємо 9 плиток
            for (let i = 0; i < 9; i++) {
                const tile = document.createElement('div');
                tile.classList.add('tile');
                tile.dataset.index = i;
                
                // Випадкове фото
                const randomImg = images[Math.floor(Math.random() * images.length)];
                // Випадковий ефект (0 - оригінал, інші - кольорові)
                const randomEffect = Math.floor(Math.random() * 5);
                
                const img = document.createElement('img');
                img.src = randomImg;
                img.alt = ""; // Якщо фото немає, буде пустий квадрат
                img.classList.add(`effect-${randomEffect}`);
                
                // Додаємо фоновий колір про всяк випадок, якщо картинки не завантажаться
                tile.style.backgroundColor = `rgba(${Math.random()*100}, ${Math.random()*100}, ${Math.random()*100}, 0.3)`;

                tile.appendChild(img);
                tile.addEventListener('click', () => handleTileClick(i));
                board.appendChild(tile);
            }
        }

        function nextRound() {
            userSequence = [];
            score++;
            scoreDisplay.innerText = `Раунд: ${score}`;
            
            // Додаємо новий рандомний елемент до послідовності
            const nextTile = Math.floor(Math.random() * 9);
            gameSequence.push(nextTile);
            
            playSequence();
        }

        async function playSequence() {
            isPlayingSequence = true;
            disableTiles(true);

            for (const tileIndex of gameSequence) {
                await flashTile(tileIndex);
                await new Promise(resolve => setTimeout(resolve, 300));
            }

            isPlayingSequence = false;
            disableTiles(false);
        }

        function flashTile(index) {
            return new Promise(resolve => {
                const tile = board.children[index];
                tile.classList.add('active');
                setTimeout(() => {
                    tile.classList.remove('active');
                    resolve();
                }, 600);
            });
        }

        function handleTileClick(index) {
            if (isPlayingSequence) return;

            userSequence.push(index);
            const currentStep = userSequence.length - 1;

            // Перевірка натискання
            if (userSequence[currentStep] === gameSequence[currentStep]) {
                // Візуальний відгук
                board.children[index].classList.add('active');
                setTimeout(() => board.children[index].classList.remove('active'), 200);

                if (userSequence.length === gameSequence.length) {
                    setTimeout(nextRound, 800);
                }
            } else {
                gameOver();
            }
        }

        function gameOver() {
            alert(`Гру закінчено! Твій результат: ${score - 1}`);
            saveHighScore(score - 1);
            
            gameContainer.classList.add('hidden');
            menu.classList.remove('hidden');
            board.style.display = 'none';
            updateHighScoreDisplay();
        }

        function disableTiles(disable) {
            const tiles = document.querySelectorAll('.tile');
            tiles.forEach(tile => {
                if (disable) tile.classList.add('disabled');
                else tile.classList.remove('disabled');
            });
        }

        function saveHighScore(currentScore) {
            const high = localStorage.getItem('memoryLoveScore') || 0;
            if (currentScore > high) {
                localStorage.setItem('memoryLoveScore', currentScore);
            }
        }

        function updateHighScoreDisplay() {
            const high = localStorage.getItem('memoryLoveScore') || 0;
            highScoreElement.innerText = high;
        }

        function resetHighScore() {
            if(confirm("Ти впевнений, що хочеш скинути рекорд?")) {
                localStorage.setItem('memoryLoveScore', 0);
                updateHighScoreDisplay();
            }
        }
    </script>
</body>
</html>
